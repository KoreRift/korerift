name: Build e Deploy su TopHost

# Si attiva a ogni push sul ramo main, o manualmente dal tab "Actions".
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4

      - name: Prepara Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installa le dipendenze
        run: npm ci

      - name: Ottimizza immagini caricate dall'editor (uploads)
        run: node scripts/ottimizza-uploads.mjs

      - name: Costruisci il sito
        run: npm run build

      - name: Carica su TopHost via FTP (lftp)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          # Pulisce l'host (toglie eventuale ftp://, porta, percorso e spazi/a-capo)
          HOST="$(printf '%s' "$FTP_SERVER" | sed 's#^[a-zA-Z]*://##' | tr -d '[:space:]' | sed 's#/.*##; s/:.*//')"
          USER="$(printf '%s' "$FTP_USERNAME" | tr -d '\r\n' | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
          DIR="$(printf '%s' "$FTP_SERVER_DIR" | tr -d '\r\n' | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
          echo "Host risolto (lunghezza): ${#HOST} caratteri"
          lftp -u "$USER","$FTP_PASSWORD" "$HOST" -e "set cmd:fail-exit yes; set ftp:ssl-allow no; set ftp:passive-mode on; set ftp:prefer-epsv no; set net:max-retries 5; set net:persist-retries 10; set net:timeout 30; set net:reconnect-interval-base 3; mirror -R --no-perms --parallel=1 --verbose ./dist/ \"$DIR\"; bye"
