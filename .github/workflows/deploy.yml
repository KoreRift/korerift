name: Build e Deploy su TopHost

# Si attiva a ogni push sul ramo main, o manualmente dal tab "Actions".
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4

      - name: Prepara Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installa le dipendenze
        run: npm ci

      - name: Costruisci il sito
        run: npm run build

      - name: Carica su TopHost via FTP (lftp)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -c "set cmd:fail-exit yes; set ftp:ssl-allow no; set ftp:passive-mode on; set ftp:prefer-epsv no; set net:max-retries 5; set net:persist-retries 10; set net:timeout 30; set net:reconnect-interval-base 3; open -u '$FTP_USERNAME','$FTP_PASSWORD' '$FTP_SERVER'; mirror -R --no-perms --parallel=1 --verbose ./dist/ '$FTP_SERVER_DIR'"
